- name: Deploy Multi-Scrobbler as docker
  hosts: music
  roles:
    - docker-compose
  vars:
    docker_compose_projectname: multi-scrobbler
    requested_image_version:
      multi-scrobbler: "foxxmd/multi-scrobbler:0.14.2"
    docker_compose_create_dirs:
      - name: config
    docker_compose_template_files_copy:
      - name: config/config.json
