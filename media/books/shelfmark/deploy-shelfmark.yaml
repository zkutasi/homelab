- name: Deploy ShelfMark as docker
  hosts: books
  roles:
    - docker-compose
  vars:
    docker_compose_projectname: shelfmark
    requested_image_version:
      shelfmark: "ghcr.io/calibrain/shelfmark:v1.3.2"
    docker_compose_create_dirs:
      - name: config
    docker_compose_extra_volumes: "{{ books_mounts | default([]) }}"
