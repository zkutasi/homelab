apiVersion: projectcontour.io/v1
kind: HTTPProxy
metadata:
  labels:
    k8s-app: cupdate
  name: cupdate-httpproxy
spec:
  routes:
    - conditions:
        - prefix: /
      services:
        - name: cupdate
          port: 8080
  virtualhost:
    corsPolicy:
      allowCredentials: true
      allowOrigin:
        - "*"  # allows any origin
      allowMethods:
        - GET
        - POST
        - OPTIONS
      allowHeaders:
        - authorization
        - cache-control
      exposeHeaders:
        - Content-Length
        - Content-Range
      maxAge: "10m"  # preflight requests can be cached for 10 minutes.
    fqdn: cupdate.kubernetes.home
    tls:
      secretName: cupdate-cert-secret
