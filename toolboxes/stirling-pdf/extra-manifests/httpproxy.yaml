apiVersion: projectcontour.io/v1
kind: HTTPProxy
metadata:
  labels:
    k8s-app: stirling-pdf
  name: stirling-pdf-httpproxy
spec:
  routes:
    - conditions:
        - prefix: /
      services:
        - name: stirling-pdf-stirling-pdf-chart
          port: 8080
  virtualhost:
    corsPolicy:
      allowCredentials: true
      allowOrigin:
        - "*"  # allows any origin
      allowMethods:
        - GET
        - POST
        - OPTIONS
      allowHeaders:
        - authorization
        - cache-control
      exposeHeaders:
        - Content-Length
        - Content-Range
      maxAge: "10m"  # preflight requests can be cached for 10 minutes.
    fqdn: stirling-pdf.kubernetes.home
    tls:
      secretName: stirling-pdf-cert-secret
