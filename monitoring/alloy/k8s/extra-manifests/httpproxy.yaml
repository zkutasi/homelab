apiVersion: projectcontour.io/v1
kind: HTTPProxy
metadata:
  labels:
    k8s-app: alloy
  name: alloy-httpproxy
spec:
  routes:
    - conditions:
        - prefix: /
      services:
        - name: alloy
          port: 12345
  virtualhost:
    corsPolicy:
      allowCredentials: true
      allowOrigin:
        - "*" # allows any origin
      allowMethods:
        - GET
        - POST
        - OPTIONS
      allowHeaders:
        - authorization
        - cache-control
      exposeHeaders:
        - Content-Length
        - Content-Range
      maxAge: "10m" # preflight requests can be cached for 10 minutes.
    fqdn: alloy.kubernetes.home
    tls:
      secretName: alloy-cert-secret
