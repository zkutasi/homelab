apiVersion: projectcontour.io/v1
kind: HTTPProxy
metadata:
  labels:
    k8s-app: reubah
  name: reubah-httpproxy
spec:
  routes:
    - conditions:
        - prefix: /
      services:
        - name: reubah
          port: 8081
  virtualhost:
    corsPolicy:
      allowCredentials: true
      allowOrigin:
        - "*" # allows any origin
      allowMethods:
        - GET
        - POST
        - OPTIONS
      allowHeaders:
        - authorization
        - cache-control
      exposeHeaders:
        - Content-Length
        - Content-Range
      maxAge: "10m" # preflight requests can be cached for 10 minutes.
    fqdn: reubah.kubernetes.home
    tls:
      secretName: reubah-cert-secret
