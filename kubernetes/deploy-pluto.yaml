- name: Deploy pluto
  hosts: controlserver
  roles:
    - binary-install
  vars:
    requested_binary_version: "5.24.0"
    bin_filename: pluto
    binary_repository: "FairwindsOps/pluto"
    download_url: "https://github.com/{{ binary_repository }}/releases/download/\
          v{{ requested_binary_version }}/{{ bin_filename }}_{{ requested_binary_version }}_linux_amd64.tar.gz"
    version_flag: "version"
    decompression_options:
      - "--wildcards"
      - "{{ bin_filename }}*"
