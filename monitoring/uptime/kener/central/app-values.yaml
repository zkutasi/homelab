cnpg:
  main:
    enabled: true
    database: kener
    monitoring:
      enablePodMonitor: true
    user: kener

redis:
  enabled: true

image:
  repository: rajnandan1/kener
  tag: 4.1.2
  pullPolicy: IfNotPresent

service:
  main:
    enabled: true
    ports:
      main:
        port: 3000
        protocol: http
        targetPort: 3000

TZ: Europe/Budapest

workload:
  main:
    enabled: true
    type: Deployment
    podSpec:
      containers:
        main:
          enabled: true
          env:
            DATABASE_URL:
              secretKeyRef:
                name: cnpg-main-urls
                key: std
          probes:
            liveness:
              enabled: false
            readiness:
              enabled: false
            startup:
              enabled: false
