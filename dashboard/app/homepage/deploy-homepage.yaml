- name: Deploy Homepage as docker
  hosts: dashboard
  roles:
    - docker-compose
  vars:
    docker_compose_projectname: homepage
    requested_image_version:
      homepage: "ghcr.io/gethomepage/homepage:v1.13.2"
    docker_compose_create_dirs:
      - name: config
      - name: certs
    docker_compose_static_files_copy:
      - name: certs
