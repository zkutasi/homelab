---
- name: Create Kubernetes TLS Secrets for Goldmane and Whisker Backend
  hosts: k8s-controller-1
  become: true
  vars:
    cert_dir: /etc/calico/certs
    kubeconfig: /etc/kubernetes/admin.conf
    namespace: kube-system
    services:
      - name: goldmane
      - name: whisker-backend
  tasks:
    - name: Slurp Goldmane cert
      ansible.builtin.slurp:
        src: "{{ cert_dir }}/goldmane.crt"
      register: goldmane_crt
    - name: Slurp Goldmane key
      ansible.builtin.slurp:
        src: "{{ cert_dir }}/goldmane.key"
      register: goldmane_key
    - name: Slurp Whisker cert
      ansible.builtin.slurp:
        src: "{{ cert_dir }}/whisker-backend.crt"
      register: whisker_crt
    - name: Slurp Whisker key
      ansible.builtin.slurp:
        src: "{{ cert_dir }}/whisker-backend.key"
      register: whisker_key
    - name: Slurp CA cert
      ansible.builtin.slurp:
        src: /etc/kubernetes/ssl/ca.crt
      register: ca_crt
    - name: Install Kubernetes Python client
      ansible.builtin.apt:
        name: python3-kubernetes
        state: present
    - name: Create Goldmane secret
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig }}"
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: goldmane-tls
            namespace: "{{ namespace }}"
          type: kubernetes.io/tls
          data:
            tls.crt: "{{ goldmane_crt.content }}"
            tls.key: "{{ goldmane_key.content }}"
            ca.crt: "{{ ca_crt.content }}"
    - name: Create Whisker backend secret
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig }}"
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: whisker-backend-tls
            namespace: "{{ namespace }}"
          type: kubernetes.io/tls
          data:
            tls.crt: "{{ whisker_crt.content }}"
            tls.key: "{{ whisker_key.content }}"
            ca.crt: "{{ ca_crt.content }}"
