apiVersion: projectcontour.io/v1
kind: HTTPProxy
metadata:
  name: ceph-dashboard-httpproxy
spec:
  routes:
    - conditions:
        - prefix: /
      services:
        - name: rook-ceph-mgr-dashboard
          port: 8443
          protocol: tls
  virtualhost:
    corsPolicy:
      allowCredentials: true
      allowOrigin:
        - "*"  # allows any origin
      allowMethods:
        - GET
        - POST
        - OPTIONS
      allowHeaders:
        - authorization
        - cache-control
      exposeHeaders:
        - Content-Length
        - Content-Range
      maxAge: "10m"  # preflight requests can be cached for 10 minutes.
    fqdn: ceph.kubernetes.home
    tls:
      secretName: ceph-dashboard-cert-secret
