apiVersion: projectcontour.io/v1
kind: HTTPProxy
metadata:
  labels:
    k8s-app: tianji
  name: tianji-httpproxy
spec:
  routes:
    - conditions:
        - prefix: /
      enableWebsockets: true
      services:
        - name: tianji
          port: 12345
      timeoutPolicy:
        idle: infinity
        response: infinity
  virtualhost:
    fqdn: tianji.kubernetes.home
    tls:
      secretName: tianji-cert-secret
