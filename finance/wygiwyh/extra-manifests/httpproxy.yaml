apiVersion: projectcontour.io/v1
kind: HTTPProxy
metadata:
  labels:
    k8s-app: wygiwyh
  name: wygiwyh-httpproxy
spec:
  routes:
    - conditions:
        - prefix: /
      services:
        - name: wygiwyh
          port: 8000
      timeoutPolicy:
        idle: infinity
        response: infinity
  virtualhost:
    corsPolicy:
      allowCredentials: true
      allowOrigin:
        - "*" # allows any origin
      allowMethods:
        - GET
        - POST
        - OPTIONS
      allowHeaders:
        - authorization
        - cache-control
      exposeHeaders:
        - Content-Length
        - Content-Range
      maxAge: "10m" # preflight requests can be cached for 10 minutes.
    fqdn: wygiwyh.kubernetes.home
    tls:
      secretName: wygiwyh-cert-secret
