apiVersion: projectcontour.io/v1
kind: HTTPProxy
metadata:
  labels:
    k8s-app: patchmon
  name: patchmon-httpproxy
spec:
  routes:
    - conditions:
        - prefix: /
      enableWebsockets: true
      permitInsecure: true
      services:
        - name: patchmon
          port: 3000
  virtualhost:
    corsPolicy:
      allowCredentials: true
      allowOrigin:
        - "*" # allows any origin
      allowMethods:
        - GET
        - POST
        - OPTIONS
      allowHeaders:
        - authorization
        - cache-control
      exposeHeaders:
        - Content-Length
        - Content-Range
      maxAge: "10m" # preflight requests can be cached for 10 minutes.
    fqdn: patchmon.kubernetes.home
    tls:
      secretName: patchmon-cert-secret
