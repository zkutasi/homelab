- name: Generate dynamic configuration for Homepage for K8s services
  hosts: dashboard
  gather_facts: false
  tasks:
    - name: Gather Contour HTTPProxy resources
      kubernetes.core.k8s_info:
        kubeconfig: "/runner/.kube/config"
        api_version: projectcontour.io/v1
        kind: HTTPProxy
      delegate_to: localhost
      register: contour_proxies
    - name: Extract FQDNs
      ansible.builtin.set_fact:
        contour_fqdns: >-
          {{
            contour_proxies.resources
            | map(attribute='spec.virtualhost.fqdn')
            | select('defined')
            | map('split', '.')
            | map('first')
            | list
          }}
- name: Generate dynamic configuration for Homepage
  hosts: dashboard
  tasks:
    - name: Generate service configuration file from template
      ansible.builtin.template:
        src: config/templates/config/services.yaml.j2
        dest: "{{ ansible_user_dir }}/docker-compose/homepage/config/services.yaml"
    - name: Generate information widgets configuration file from template
      ansible.builtin.template:
        src: config/templates/config/widgets.yaml.j2
        dest: "{{ ansible_user_dir }}/docker-compose/homepage/config/widgets.yaml"
