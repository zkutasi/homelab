- name: Deploy OliveTin as docker
  hosts: controlserver
  roles:
    - docker-compose
  vars:
    docker_compose_projectname: olivetin
    requested_image_version:
      olivetin: "jamesread/olivetin:3000.16.2"
    docker_compose_create_dirs:
      - name: config
    docker_compose_template_files_copy:
      - name: config/config.yaml
