- name: Deploy Grimmory as docker
  hosts: books
  roles:
    - docker-compose
  vars:
    docker_compose_projectname: grimmory
    requested_image_version:
      grimmory: "grimmory/grimmory:v3.2.4"
      mariadb: "lscr.io/linuxserver/mariadb:11.4.5"
    docker_compose_create_dirs:
      - name: data
      - name: bookdrop
      - name: mariadb/config
    docker_compose_extra_volumes: "{{ books_mounts | default([]) }}"
