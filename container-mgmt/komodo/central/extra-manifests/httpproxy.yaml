apiVersion: projectcontour.io/v1
kind: HTTPProxy
metadata:
  labels:
    k8s-app: komodo
  name: komodo-httpproxy
spec:
  routes:
    - conditions:
        - prefix: /
      services:
        - name: komodo
          port: 9120
  virtualhost:
    corsPolicy:
      allowCredentials: true
      allowOrigin:
        - "*" # allows any origin
      allowMethods:
        - GET
        - POST
        - OPTIONS
      allowHeaders:
        - authorization
        - cache-control
      exposeHeaders:
        - Content-Length
        - Content-Range
      maxAge: "10m" # preflight requests can be cached for 10 minutes.
    fqdn: komodo.kubernetes.home
    tls:
      secretName: komodo-cert-secret
