apiVersion: projectcontour.io/v1
kind: HTTPProxy
metadata:
  labels:
    k8s-app: kener
  name: kener-httpproxy
spec:
  routes:
    - conditions:
        - prefix: /
      enableWebsockets: true
      services:
        - name: kener
          port: 3000
      timeoutPolicy:
        idle: infinity
        response: infinity
  virtualhost:
    fqdn: kener.kubernetes.home
    tls:
      secretName: kener-cert-secret
