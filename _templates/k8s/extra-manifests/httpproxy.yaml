apiVersion: projectcontour.io/v1
kind: HTTPProxy
metadata:
  labels:
    k8s-app: <APP_NAME_LOWERCASE>
  name: <APP_NAME_LOWERCASE>-httpproxy
spec:
  routes:
    - conditions:
        - prefix: /
      enableWebsockets: true
      services:
        - name: <APP_NAME_LOWERCASE>
          port: <APP_PORT>
      timeoutPolicy:
        idle: infinity
        response: infinity
  virtualhost:
    corsPolicy:
      allowCredentials: true
      allowOrigin:
        - "*"  # allows any origin
      allowMethods:
        - GET
        - POST
        - OPTIONS
      allowHeaders:
        - authorization
        - cache-control
      exposeHeaders:
        - Content-Length
        - Content-Range
      maxAge: "10m"  # preflight requests can be cached for 10 minutes.
    fqdn: <APP_NAME_LOWERCASE>.kubernetes.home
    tls:
      secretName: <APP_NAME_LOWERCASE>-cert-secret
