apiVersion: projectcontour.io/v1
kind: HTTPProxy
metadata:
  labels:
    k8s-app: wazuh
  name: wazuh-httpproxy
spec:
  routes:
    - conditions:
        - prefix: /
      services:
        - name: dashboard
          port: 443
          protocol: tls
  virtualhost:
    corsPolicy:
      allowCredentials: true
      allowOrigin:
        - "*"  # allows any origin
      allowMethods:
        - GET
        - POST
        - OPTIONS
      allowHeaders:
        - authorization
        - cache-control
      exposeHeaders:
        - Content-Length
        - Content-Range
      maxAge: "10m"  # preflight requests can be cached for 10 minutes.
    fqdn: wazuh.kubernetes.home
    tls:
      secretName: wazuh-cert-secret
