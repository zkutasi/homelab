apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/name: whisker
    k8s-app: whisker
  name: whisker
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      k8s-app: whisker
  strategy:
    type: Recreate
  template:
    metadata:
      creationTimestamp: null
      labels:
        app.kubernetes.io/name: whisker
        k8s-app: whisker
      name: whisker
    spec:
      containers:
        - env:
            - name: LOG_LEVEL
              value: INFO
            - name: CALICO_VERSION
              value: v3.30.2
            - name: NOTIFICATIONS
              value: Enabled
          image: docker.io/calico/whisker:v3.30.2
          imagePullPolicy: IfNotPresent
          name: whisker
          resources: {}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            privileged: false
            runAsGroup: 10001
            runAsNonRoot: true
            runAsUser: 10001
            seccompProfile:
              type: RuntimeDefault
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
        - env:
            - name: LOG_LEVEL
              value: INFO
            - name: PORT
              value: "3002"
            - name: GOLDMANE_HOST
              value: goldmane.kube-system.svc.cluster.local:7443
            - name: TLS_CERT_PATH
              value: /whisker-backend-tls/tls.crt
            - name: TLS_KEY_PATH
              value: /whisker-backend-tls/tls.key
            - name: CA_CERT_PATH
              value: /etc/pki/tls/certs/ca.crt
          image: docker.io/calico/whisker-backend:v3.30.2
          imagePullPolicy: IfNotPresent
          name: whisker-backend
          resources: {}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            privileged: false
            runAsGroup: 10001
            runAsNonRoot: true
            runAsUser: 10001
            seccompProfile:
              type: RuntimeDefault
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          volumeMounts:
            - mountPath: /whisker-backend-tls
              name: whisker-backend-tls
              readOnly: true
            - mountPath: /etc/pki/tls/certs
              name: whisker-backend-ca
              readOnly: true
      dnsPolicy: ClusterFirst
      nodeSelector:
        kubernetes.io/os: linux
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      serviceAccount: whisker
      serviceAccountName: whisker
      terminationGracePeriodSeconds: 30
      tolerations:
        - effect: NoSchedule
          key: node-role.kubernetes.io/master
        - effect: NoSchedule
          key: node-role.kubernetes.io/control-plane
        - key: CriticalAddonsOnly
          operator: Exists
      volumes:
        - secret:
            defaultMode: 420
            secretName: whisker-backend-tls
          name: whisker-backend-tls
        - secret:
            defaultMode: 420
            secretName: whisker-backend-tls
          name: whisker-backend-ca
