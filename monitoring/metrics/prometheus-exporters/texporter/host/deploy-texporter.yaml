- name: Deploy Texporter as binary
  hosts: linux
  roles:
    - role: binary-install
      when: texporter_interface | default("") | length > 0
  vars:
    requested_binary_repo_version: "kasd/texporter:1.0.1"
    binary_repository: "{{ requested_binary_repo_version.split(':')[0] }}"
    requested_binary_version: "{{ requested_binary_repo_version.split(':')[1] }}"
    bin_filename: texporter
    service_name: texporter
    bin_serviceparams: "--interface {{ texporter_interface  }} \
      --ip-ranges-filename /etc/texporter/config.json \
      --log-level info \
      --port {{ port_texporter }} \
      --skip-dns"
    download_url: "https://github.com/{{ binary_repository }}/releases/download/\
          v{{ requested_binary_version }}/{{ bin_filename }}_{{ requested_binary_version }}_Linux_x86_64.tar.gz"
    version_flag: ""
    decompression_options:
      - "--wildcards"
      - "{{ bin_filename }}*"
