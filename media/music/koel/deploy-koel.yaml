- name: Deploy Koel as docker
  hosts: htpc
  roles:
    - docker-compose
  vars:
    docker_compose_projectname: koel
    requested_image_version:
      koel: "phanan/koel:8.3.1"
      postgresql: "postgres:13"
    docker_compose_create_dirs:
      - name: image_storage
      - name: search_index
      - name: db
    docker_compose_extra_volumes: "{{ music_mounts | default([]) }}"
