apiVersion: projectcontour.io/v1
kind: HTTPProxy
metadata:
  labels:
    k8s-app: web-check
  name: web-check-httpproxy
spec:
  routes:
    - conditions:
        - prefix: /
      services:
        - name: web-check
          port: 3000
  virtualhost:
    corsPolicy:
      allowCredentials: true
      allowOrigin:
        - "*" # allows any origin
      allowMethods:
        - GET
        - POST
        - OPTIONS
      allowHeaders:
        - authorization
        - cache-control
      exposeHeaders:
        - Content-Length
        - Content-Range
      maxAge: "10m" # preflight requests can be cached for 10 minutes.
    fqdn: web-check.kubernetes.home
    tls:
      secretName: web-check-cert-secret
