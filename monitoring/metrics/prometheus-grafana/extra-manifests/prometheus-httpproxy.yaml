apiVersion: projectcontour.io/v1
kind: HTTPProxy
metadata:
  name: prometheus-httpproxy
spec:
  routes:
    - conditions:
        - prefix: /
      services:
        - name: kube-prometheus-stack-prometheus
          port: 9090
  virtualhost:
    corsPolicy:
      allowCredentials: true
      allowOrigin:
        - "*" # allows any origin
      allowMethods:
        - GET
        - POST
        - OPTIONS
      allowHeaders:
        - authorization
        - cache-control
      exposeHeaders:
        - Content-Length
        - Content-Range
      maxAge: "10m" # preflight requests can be cached for 10 minutes.
    fqdn: prometheus.kubernetes.home
    tls:
      secretName: prometheus-cert-secret
