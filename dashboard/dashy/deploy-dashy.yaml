- name: Deploy Dashy as docker
  hosts: dashboard
  roles:
    - docker-compose
  vars:
    docker_compose_projectname: dashy
    requested_image_version:
      dashy: "3.2.0"
    docker_compose_create_dirs:
      - name: config
      - name: item-icons
      - name: certs
    docker_compose_static_files_copy:
      - name: certs
