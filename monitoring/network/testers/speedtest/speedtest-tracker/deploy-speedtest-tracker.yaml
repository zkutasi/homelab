- name: Deploy speedtest-tracker as docker
  hosts: networkmonitoring
  roles:
    - docker-compose
  vars:
    docker_compose_projectname: speedtest-tracker
    requested_image_version:
      speedtest-tracker: "lscr.io/linuxserver/speedtest-tracker:1.13.12"
    docker_compose_create_dirs:
      - name: config
