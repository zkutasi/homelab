version: 3
dependencies:
  ansible_core:
    package_pip: ansible-core<2.18
  ansible_runner:
    package_pip: ansible-runner==2.4.3
  galaxy:
    collections:
      - name: community.crypto
        type: galaxy
      - name: community.docker
        type: galaxy
      - name: community.general
        type: galaxy
      - name: kubernetes.core
        type: galaxy
    roles:
      - name: simoncaron.pve_permissions
        type: galaxy
  python:
    - ansible-lint
    - dnspython
    - jmespath
    - passlib
    - pypsrp
  python_interpreter:
    package_system: "python312"
    python_path: "/usr/bin/python3.12"

images:
  base_image:
    name: ghcr.io/ansible-community/community-ee-base:latest
