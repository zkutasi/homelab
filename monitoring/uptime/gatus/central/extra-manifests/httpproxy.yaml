apiVersion: projectcontour.io/v1
kind: HTTPProxy
metadata:
  labels:
    k8s-app: gatus
  name: gatus-httpproxy
spec:
  routes:
    - conditions:
        - prefix: /
      enableWebsockets: true
      services:
        - name: gatus
          port: 8080
      timeoutPolicy:
        idle: infinity
        response: infinity
  virtualhost:
    fqdn: gatus.kubernetes.home
    tls:
      secretName: gatus-cert-secret
