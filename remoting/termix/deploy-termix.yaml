- name: Deploy Termix as docker
  hosts: control
  roles:
    - docker-compose
  vars:
    docker_compose_projectname: termix
    requested_image_version:
      termix: "ghcr.io/lukegus/termix:release-2.3.1"
      termix-guacd: "guacamole/guacd:latest"
    docker_compose_create_dirs:
      - name: data
