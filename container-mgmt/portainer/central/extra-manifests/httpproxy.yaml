apiVersion: projectcontour.io/v1
kind: HTTPProxy
metadata:
  labels:
    k8s-app: portainer
  name: portainer-httpproxy
spec:
  routes:
    - conditions:
        - prefix: /
      services:
        - name: portainer
          port: 9443
          protocol: tls
  virtualhost:
    corsPolicy:
      allowCredentials: true
      allowOrigin:
        - "*" # allows any origin
      allowMethods:
        - GET
        - POST
        - OPTIONS
      allowHeaders:
        - authorization
        - cache-control
      exposeHeaders:
        - Content-Length
        - Content-Range
      maxAge: "10m" # preflight requests can be cached for 10 minutes.
    fqdn: portainer.kubernetes.home
    tls:
      secretName: portainer-cert-secret
