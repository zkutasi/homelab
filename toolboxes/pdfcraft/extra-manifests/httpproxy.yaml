apiVersion: projectcontour.io/v1
kind: HTTPProxy
metadata:
  labels:
    k8s-app: pdfcraft
  name: pdfcraft-httpproxy
spec:
  routes:
    - conditions:
        - prefix: /
      services:
        - name: pdfcraft
          port: 80
  virtualhost:
    fqdn: pdfcraft.kubernetes.home
    tls:
      secretName: pdfcraft-cert-secret
