- name: Deploy starship
  hosts: linux
  roles:
    - binary-install
  vars:
    requested_binary_repo_version: "starship/starship:1.25.1"
    binary_repository: "{{ requested_binary_repo_version.split(':')[0] }}"
    requested_binary_version: "{{ requested_binary_repo_version.split(':')[1] }}"
    bin_filename: starship
    arch_map:
      x86_64: x86_64
      aarch64: aarch64
      arm64: aarch64
    arch: "{{ arch_map.get(ansible_architecture, ansible_architecture) }}"
    download_url: https://github.com/{{ binary_repository }}/releases/download/v{{
      requested_binary_version }}/starship-{{ arch }}-unknown-linux-musl.tar.gz
    destination_path: "/usr/local/bin/{{ bin_filename }}"
    decompression_options: []
- name: Add the inclusion of starship in the bashrc file
  hosts: linux
  tasks:
    - name: Add the inclusion of starship in the bashrc file
      ansible.builtin.lineinfile:
        path: "{{ ansible_user_dir }}/.bashrc"
        line: 'eval "$(starship init bash)"'
        state: present
        create: true
- name: Template the starship configuration file
  hosts: linux
  tasks:
    - name: Ensure the .config directory exists
      ansible.builtin.file:
        path: "{{ ansible_user_dir }}/.config"
        state: directory
    - name: Template the starship configuration file
      ansible.builtin.template:
        src: "all/starship.toml.j2"
        dest: "{{ ansible_user_dir }}/.config/starship.toml"
