apiVersion: projectcontour.io/v1
kind: HTTPProxy
metadata:
  labels:
    k8s-app: checkmate
  name: checkmate-httpproxy
spec:
  routes:
    - conditions:
        - prefix: /
      enableWebsockets: true
      services:
        - name: checkmate
          port: 52345
      timeoutPolicy:
        idle: infinity
        response: infinity
  virtualhost:
    fqdn: checkmate.kubernetes.home
    tls:
      secretName: checkmate-cert-secret
