apiVersion: projectcontour.io/v1
kind: HTTPProxy
metadata:
  labels:
    k8s-app: searxng
  name: searxng-httpproxy
spec:
  routes:
    - conditions:
        - prefix: /
      enableWebsockets: true
      services:
        - name: searxng
          port: 8080
      timeoutPolicy:
        idle: infinity
        response: infinity
  virtualhost:
    fqdn: searxng.kubernetes.home
    tls:
      secretName: searxng-cert-secret
