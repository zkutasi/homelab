image:
  repository: gotify/server
  tag: 2.9.1
  pullPolicy: IfNotPresent
persistence:
  data:
    enabled: true
    accessModes: ReadWriteOnce
    mountPath: /app/data
    type: pvc
    size: 1Gi
service:
  main:
    enabled: true
    ports:
      main:
        port: 8080
        protocol: http
        targetPort: 8080
TZ: Europe/Budapest
workload:
  main:
    enabled: true
    type: Deployment
    podSpec:
      containers:
        main:
          enabled: true
          env:
            GOTIFY_SERVER_PORT: 8080
          probes:
            liveness:
              enabled: false
            readiness:
              enabled: false
            startup:
              enabled: false
