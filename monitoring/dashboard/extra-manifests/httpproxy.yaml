apiVersion: projectcontour.io/v1
kind: HTTPProxy
metadata:
  labels:
    k8s-app: kubernetes-dashboard
  name: kubernetes-dashboard-httpproxy
spec:
  routes:
    - conditions:
        - prefix: /
      services:
        - name: kubernetes-dashboard-kong-proxy
          port: 443
          protocol: tls
  virtualhost:
    corsPolicy:
      allowCredentials: true
      allowOrigin:
        - "*" # allows any origin
      allowMethods:
        - GET
        - POST
        - OPTIONS
      allowHeaders:
        - authorization
        - cache-control
      exposeHeaders:
        - Content-Length
        - Content-Range
      maxAge: "10m" # preflight requests can be cached for 10 minutes.
    fqdn: dashboard.kubernetes.home
    tls:
      secretName: kubernetes-dashboard-cert-secret
