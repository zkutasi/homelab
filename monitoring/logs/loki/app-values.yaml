global:
  dnsService: coredns
loki:
  compactor:
    delete_request_store: s3
    retention_enabled: true
    working_directory: /var/loki/compactor
  limits_config:
    allow_structured_metadata: true
    volume_enabled: true
  pattern_ingester:
    enabled: true
  ruler:
    enable_api: true
  storage:
    bucketNames:
      chunks: loki-chunks
      ruler: loki-ruler

deploymentMode: Monolithic

# Zero out replica counts of other deployment modes
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0

ingester:
  replicas: 0
querier:
  replicas: 0
queryFrontend:
  replicas: 0
queryScheduler:
  replicas: 0
distributor:
  replicas: 0
compactor:
  replicas: 0
indexGateway:
  replicas: 0
bloomCompactor:
  replicas: 0
bloomGateway:
  replicas: 0
