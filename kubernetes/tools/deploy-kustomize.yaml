- name: Deploy kustomize
  hosts: controlserver
  roles:
    - binary-install
  vars:
    requested_binary_repo_version: "kubernetes-sigs/kustomize:5.7.1"
    binary_repository: "{{ requested_binary_repo_version.split(':')[0] }}"
    requested_binary_version: "{{ requested_binary_repo_version.split(':')[1] }}"
    bin_filename: kustomize
    download_url: "https://github.com/{{ binary_repository }}/releases/download/{{ bin_filename }}/\
          v{{ requested_binary_version }}/{{ bin_filename }}_v{{ requested_binary_version }}_linux_amd64.tar.gz"
    version_flag: "version"
    decompression_options:
      - "--wildcards"
      - "{{ bin_filename }}"
